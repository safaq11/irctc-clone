<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<script>
window.onload = function () {
    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");

    if (msg === "success") {
        document.getElementById("message").innerText = "Registration Successful!";
        document.getElementById("message").style.color = "green";
    } else if (msg === "error") {
        document.getElementById("message").innerText = "Registration Failed!";
        document.getElementById("message").style.color = "red";
    }
    else if (msg === "exists") {
        document.getElementById("message").innerText = "User already  Exist!";
        document.getElementById("message").style.color = "red";
    }
};
</script>
<body>

<header>
    <img src="../images/logo.png" height="50" style="float:left" >
     <h1>SRCTC</h1>
</header>

<nav>
    <a href="../index.jsp">Home</a>
    <a href="../train/book-ticket.jsp">Train</a>
    <a href="#">Hotels</a>
    <a href="#">Meals</a>
    <a href="#">Holidays</a>
    <a href="login.html">My Account</a>
   
</nav>

<section class="main">
    <h2>Register</h2>
    <p id="message" style="color: green;"></p>
    <form action="register.jsp" method="post" onsubmit="return validateRegister()">
        <label>Name:</label><br>
        <input type="text" name="name" id="name"><br><br>
        <label>Email:</label><br>
        <input type="text" name="email" id="email"><br><br>
        <label>Password:</label><br>
        <input type="password" name="password" id="password"><br><br>
 
        <label>Confirm Password:</label><br>
        <input type="password" id="confirmPassword"><br><br>

        <button type="submit">Register</button>
    </form>
</section>

<footer>
    <p>© 2026 SRCTC</p>
</footer>
<script>
function validateRegister() {
    var password = document.getElementById("password").value;

    var pattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

    if (!pattern.test(password)) {
        alert("Password must contain:\n- 8+ characters\n- 1 uppercase\n- 1 lowercase\n- 1 number\n- 1 special character");
        return false;
    }

    return true;
}
</script>
</body>
</html>
